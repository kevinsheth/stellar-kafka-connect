name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Test
        run: mvn --batch-mode test

      - name: Package
        run: mvn --batch-mode package

      - name: Upload connector archive
        uses: actions/upload-artifact@v4
        with:
          name: connector-archive
          path: target/components/packages/*.zip
          if-no-files-found: error
